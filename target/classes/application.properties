spring.application.name=todo-list

# Si las variables no existen, Spring lanzará un error y NO arrancará (esto es lo que queremos)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:?}:${MYSQLPORT:?}/${MYSQL_DATABASE:?}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:?}
spring.datasource.password=${MYSQLPASSWORD:?}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Desactiva H2 explícitamente
spring.h2.console.enabled=false
spring.jpa.hibernate.ddl-auto=update
# JWT
jwt.secret=VGhpcyBpcyBhIHZlcnkgc2VjdXJlIGFuZCBsb25nIHNlY3JldCBrZXkgZm9yIEpXVCBzaWduYXR1cmU
jwt.expiration=86400000

# Configuración para Proxies Inversos (Railway)
server.forward-headers-strategy=framework

logging.level.org.springframework.security=TRACE
logging.level.org.springframework.web=TRACE
logging.level.org.apache.catalina.filters.CorsFilter=TRACE